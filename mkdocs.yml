site_name: PySimSAR v0.1 Documentation
site_description: Python SAR raw signal simulator with modular processing algorithms
repo_url: https://github.com/your-org/PySimSAR
repo_name: PySimSAR

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - search.suggest
  palette:
    - scheme: default
      primary: indigo
      accent: indigo

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - def_list
  - toc:
      permalink: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - Configuration: configuration.md
  - Data Structures: data-structures.md
  - Mathematical Principles:
    - Signal Model & Waveforms: math/signal-model.md
    - Image Formation: math/image-formation.md
    - Motion Compensation: math/motion-compensation.md
    - Autofocus: math/autofocus.md
    - Geocoding: math/geocoding.md
    - Polarimetry: math/polarimetry.md
    - Notation Table: math/notation.md
  - Customization Guide:
    - Scripting Simulations: customization/scripting.md
    - Extending Algorithms: customization/algorithms.md
    - Custom Waveforms: customization/waveforms.md
    - Custom Sensors: customization/sensors.md
  - API Reference:
    - Core: api/core.md
    - Simulation: api/simulation.md
    - Algorithms: api/algorithms.md
    - I/O: api/io.md
    - Pipeline: api/pipeline.md
  - Known Issues: known-issues.md
  - Changelog: changelog.md
